<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>CyberASCII Vision</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
  }

  body {
    display: flex;
    flex-direction: column;
    position: fixed;
    inset: 0;
    height: 100dvh;
  }

  /* scanlines overlay */
  #scanlines {
    position: fixed; inset: 0; z-index: 5; pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 4px
    );
  }

  /* top bar */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 10;
    padding: max(10px, env(safe-area-inset-top)) 16px 6px;
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    pointer-events: none;
  }
  .prompt { color: #39ff14; font-size: 14px; }
  .title  { color: #39ff14; font-size: 14px; font-weight: bold; letter-spacing: 3px; }
  .ver    { color: rgba(57,255,20,0.4); font-size: 10px; margin-left: 2px; }

  /* wrapper so canvas never bleeds over controls */
  #canvas-wrap {
    flex: 1;
    width: 100%;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }

  /* main canvas — fills wrapper only */
  #ascii-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  #canvas-wrap { position: relative; }

  /* start message */
  #start-msg {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    text-align: center; z-index: 15; pointer-events: none;
    width: 80%;
  }
  #start-msg p { font-size: 13px; color: rgba(57,255,20,0.5); letter-spacing: 2px; line-height: 2; }

  /* hidden elements */
  video, #cv-src, #cv-dl { display: none; }

  /* FABs */
  #fab-row {
    position: absolute;
    bottom: calc(68px + 14px);
    left: 50%; transform: translateX(-50%);
    display: flex; gap: 14px; z-index: 20;
  }
  .fab {
    width: 54px; height: 54px; border-radius: 50%;
    border: 2px solid rgba(57,255,20,0.45);
    background: rgba(0,0,0,0.8);
    color: #39ff14; font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    touch-action: manipulation;
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
  }
  .fab:active { transform: scale(0.9); }
  .fab.active { background: #39ff14; color: #000; box-shadow: 0 0 18px #39ff14; border-color: #39ff14; }
  #btn-flip { display: none; }
  @media (max-width: 768px) { #btn-flip { display: flex; } }

  /* controls bar */
  #controls {
    height: 68px; flex-shrink: 0;
    background: rgba(0,0,0,0.92);
    border-top: 1px solid rgba(57,255,20,0.18);
    display: flex; align-items: center;
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 0 12px;
    padding-bottom: env(safe-area-inset-bottom);
    gap: 0;
  }
  #controls::-webkit-scrollbar { display: none; }

  .ctrl-group { display: flex; align-items: center; gap: 6px; padding: 0 10px; flex-shrink: 0; }
  .ctrl-label { font-size: 9px; color: rgba(57,255,20,0.5); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }

  input[type=range] {
    -webkit-appearance: none;
    width: 72px; height: 3px;
    background: rgba(57,255,20,0.2);
    outline: none; cursor: pointer; flex-shrink: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    background: #39ff14; border-radius: 50%;
    box-shadow: 0 0 5px #39ff14;
  }
  .ctrl-val { font-size: 10px; color: #39ff14; min-width: 28px; }

  .divider { width: 1px; height: 34px; background: rgba(57,255,20,0.12); flex-shrink: 0; }

  .btn-group { display: flex; gap: 3px; flex-shrink: 0; }
  .mode-label { font-size: 9px; color: rgba(57,255,20,0.5); letter-spacing: 1px; white-space: nowrap; margin-right: 5px; }

  .mbtn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; padding: 5px 8px;
    border: 1px solid rgba(57,255,20,0.25);
    background: transparent; color: rgba(57,255,20,0.55);
    cursor: pointer; white-space: nowrap;
    touch-action: manipulation; transition: all .1s; flex-shrink: 0;
  }
  .mbtn:active { transform: scale(0.93); }
  .mbtn.active { background: #39ff14; color: #000; border-color: #39ff14; font-weight: bold; }

  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #39ff14; box-shadow: 0 0 5px #39ff14;
    animation: pulse 1.5s ease-in-out infinite;
    flex-shrink: 0; margin-left: 8px;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  #status-dot.off { background: #ff3333; box-shadow: 0 0 5px #ff3333; animation: none; }
</style>
</head>
<body>

<div id="scanlines"></div>

<div id="topbar">
  <span class="prompt">&gt;_</span>
  <span class="title">CYBERASCII</span>
  <span class="ver">v2.0</span>
</div>

<div id="canvas-wrap">
  <canvas id="ascii-canvas"></canvas>
  <div id="start-msg">
    <p>TAP ◉ TO START<br>CAMERA FEED</p>
  </div>
</div>

<video id="vid" autoplay playsinline muted></video>
<canvas id="cv-src"></canvas>
<canvas id="cv-dl"></canvas>

<div id="fab-row">
  <button class="fab" id="btn-snap" title="Save TXT">📷</button>
  <button class="fab active" id="btn-cam" title="Toggle Camera">◉</button>
  <button class="fab" id="btn-dl"   title="Download PNG">⬇</button>
  <button class="fab" id="btn-flip" title="Flip Camera">🔄</button>
</div>

<div id="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">SIZE</span>
    <input type="range" id="s-font" min="5" max="18" step="1" value="10">
    <span class="ctrl-val" id="v-font">10</span>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">GAIN</span>
    <input type="range" id="s-gain" min="0.5" max="3" step="0.1" value="1.0">
    <span class="ctrl-val" id="v-gain">1.0</span>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">CONTRAST</span>
    <input type="range" id="s-contrast" min="0.5" max="3" step="0.1" value="1.0">
    <span class="ctrl-val" id="v-contrast">1.0</span>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group">
    <span class="mode-label">MODE</span>
    <div class="btn-group">
      <button class="mbtn active" data-mode="matrix">MATRIX</button>
      <button class="mbtn" data-mode="bw">BW</button>
      <button class="mbtn" data-mode="retro">RETRO</button>
      <button class="mbtn" data-mode="color">COLOR</button>
    </div>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group">
    <span class="mode-label">CHARSET</span>
    <div class="btn-group">
      <button class="mbtn" data-charset="simple">SIMPLE</button>
      <button class="mbtn active" data-charset="complex">COMPLEX</button>
      <button class="mbtn" data-charset="binary">BINARY</button>
      <button class="mbtn" data-charset="blocks">BLOCKS</button>
    </div>
  </div>
  <div class="divider"></div>
  <div id="status-dot" class="off"></div>
</div>

<script>
// ── charset definitions ──
const CHARSETS = {
  simple:  ' .:-=+*#%@',
  complex: ' .",:;!~+=xX$&#@',
  binary:  ' 01',
  blocks:  ' ░▒▓█'
};
const MODE_COLORS = {
  matrix: '#39ff14',
  bw:     '#ffffff',
  retro:  '#ff8c00',
  color:  null
};

// ── state ──
let stream = null, raf = null, running = false;
let mode = 'matrix', charset = 'complex';
let fontSize = 10, gain = 1.0, contrast = 1.0;
let facingMode = 'user';

// ── elements ──
const vid        = document.getElementById('vid');
const cvSrc      = document.getElementById('cv-src');
const ctxSrc     = cvSrc.getContext('2d', { willReadFrequently: true });
const cvOut      = document.getElementById('ascii-canvas');
const ctxOut     = cvOut.getContext('2d');
const cvDL       = document.getElementById('cv-dl');
const ctxDL      = cvDL.getContext('2d');
const startMsg   = document.getElementById('start-msg');
const statusDot  = document.getElementById('status-dot');

// ── fix mobile height ──
function fixHeight() {
  const h = window.innerHeight;
  document.body.style.height = h + 'px';
}
fixHeight();
window.addEventListener('resize', fixHeight);
window.addEventListener('orientationchange', () => setTimeout(fixHeight, 350));

// ── pre-render ASCII chars to offscreen canvases for speed ──
// We'll cache character images so ctxOut.drawImage is used instead of fillText every pixel
let charCache = {};
let charW = 0, charH = 0;

function buildCharCache() {
  charW = Math.ceil(fontSize * 0.601);
  charH = fontSize;
  charCache = {};
  const chars = CHARSETS[charset];
  const color = mode === 'color' ? '#ffffff' : (MODE_COLORS[mode] || '#39ff14');

  for (let i = 0; i < chars.length; i++) {
    const ch = chars[i];
    if (charCache[ch]) continue;
    const oc = document.createElement('canvas');
    oc.width = charW; oc.height = charH;
    const ox = oc.getContext('2d');
    ox.fillStyle = '#000';
    ox.fillRect(0, 0, charW, charH);
    ox.fillStyle = color;
    ox.font = `${fontSize}px "Courier New", monospace`;
    ox.textBaseline = 'top';
    ox.fillText(ch, 0, 0);
    charCache[ch] = oc;
  }
}
buildCharCache();

// ── sliders ──
function setupSlider(id, valId, dec, cb) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value);
    vl.textContent = dec === 0 ? v : v.toFixed(1);
    cb(v);
  });
}
setupSlider('s-font',     'v-font',     0, v => { fontSize = v; buildCharCache(); });
setupSlider('s-gain',     'v-gain',     1, v => { gain = v; });
setupSlider('s-contrast', 'v-contrast', 1, v => { contrast = v; });

// ── mode / charset buttons ──
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    buildCharCache();
  });
});
document.querySelectorAll('[data-charset]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-charset]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    charset = btn.dataset.charset;
    buildCharCache();
  });
});

// ── camera ──
document.getElementById('btn-cam').addEventListener('click', () => {
  running ? stopCamera() : startCamera();
});
document.getElementById('btn-flip').addEventListener('click', async () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  if (running) { stopCamera(); await startCamera(); }
});

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    vid.srcObject = stream;
    await vid.play();
    running = true;
    startMsg.style.display = 'none';
    statusDot.classList.remove('off');
    document.getElementById('btn-cam').classList.add('active');
    loop();
  } catch(e) {
    startMsg.innerHTML = '<p style="color:#ff4444;font-size:11px">ERR::CAM_DENIED<br><span style="color:rgba(255,68,68,0.45);font-size:10px">must open via https://</span></p>';
  }
}

function stopCamera() {
  running = false;
  if (raf) cancelAnimationFrame(raf);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  statusDot.classList.add('off');
  document.getElementById('btn-cam').classList.remove('active');
  startMsg.style.display = 'block';
  startMsg.innerHTML = '<p>TAP ◉ TO START<br>CAMERA FEED</p>';
}

function loop() { if (!running) return; render(); raf = requestAnimationFrame(loop); }

// ── core render — canvas only, zero DOM writes ──
function render() {
  if (vid.readyState < 2) return;

  const W = cvOut.offsetWidth  || cvOut.parentElement.clientWidth;
  const H = cvOut.offsetHeight || cvOut.parentElement.clientHeight;
  if (W === 0 || H === 0) return;

  // set output canvas size to match display
  if (cvOut.width !== W || cvOut.height !== H) {
    cvOut.width = W;
    cvOut.height = H;
  }

  const cols = Math.max(1, Math.floor(W / charW));
  const rows = Math.max(1, Math.floor(H / charH));

  // sample video at col×row resolution
  cvSrc.width = cols; cvSrc.height = rows;
  ctxSrc.save();
  if (facingMode === 'user') { ctxSrc.translate(cols, 0); ctxSrc.scale(-1, 1); }
  ctxSrc.drawImage(vid, 0, 0, cols, rows);
  ctxSrc.restore();

  const pixels = ctxSrc.getImageData(0, 0, cols, rows).data;
  const chars  = CHARSETS[charset];

  // black background
  ctxOut.fillStyle = '#000';
  ctxOut.fillRect(0, 0, W, H);

  if (mode === 'color') {
    // COLOR mode: draw each char with its pixel colour using fillText
    ctxOut.font = `${fontSize}px "Courier New", monospace`;
    ctxOut.textBaseline = 'top';
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const i = (y * cols + x) * 4;
        let r = pixels[i], g = pixels[i+1], b = pixels[i+2];
        let lum = 0.299*r + 0.587*g + 0.114*b;
        lum = Math.max(0, Math.min(255, (lum * gain - 128) * contrast + 128));
        const idx = Math.floor((lum / 255) * (chars.length - 1));
        const ch = chars[idx] || ' ';
        if (ch === ' ') continue;
        r = Math.min(255, r * gain) | 0;
        g = Math.min(255, g * gain) | 0;
        b = Math.min(255, b * gain) | 0;
        ctxOut.fillStyle = `rgb(${r},${g},${b})`;
        ctxOut.fillText(ch, x * charW, y * charH);
      }
    }
  } else {
    // MONO modes: use cached char images via drawImage — very fast
    const color = MODE_COLORS[mode];
    // rebuild cache if color changed (e.g. mode switch)
    if (!charCache[chars[chars.length-1]]) buildCharCache();

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const i = (y * cols + x) * 4;
        let lum = 0.299*pixels[i] + 0.587*pixels[i+1] + 0.114*pixels[i+2];
        lum = Math.max(0, Math.min(255, (lum * gain - 128) * contrast + 128));
        const idx = Math.floor((lum / 255) * (chars.length - 1));
        const ch = chars[idx] || ' ';
        if (ch === ' ') continue;
        const img = charCache[ch];
        if (img) ctxOut.drawImage(img, x * charW, y * charH);
      }
    }
  }
}

// ── snapshot .txt ──
document.getElementById('btn-snap').addEventListener('click', () => {
  if (!running) return;
  // reconstruct text from last frame
  const cols = Math.floor(cvOut.width / charW);
  const rows = Math.floor(cvOut.height / charH);
  const chars = CHARSETS[charset];
  const pixels = ctxSrc.getImageData(0, 0, cols, rows).data;
  let out = '';
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = (y*cols+x)*4;
      let lum = 0.299*pixels[i]+0.587*pixels[i+1]+0.114*pixels[i+2];
      lum = Math.max(0,Math.min(255,(lum*gain-128)*contrast+128));
      out += chars[Math.floor((lum/255)*(chars.length-1))]||' ';
    }
    out += '\n';
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([out], { type:'text/plain' }));
  a.download = `cyberascii-${Date.now()}.txt`;
  a.click();
});

// ── download .png — just screenshot the canvas ──
document.getElementById('btn-dl').addEventListener('click', () => {
  if (!running) return;
  const a = document.createElement('a');
  a.href = cvOut.toDataURL('image/png');
  a.download = `cyberascii-${Date.now()}.png`;
  a.click();
});
</script>
</body>
</html>
